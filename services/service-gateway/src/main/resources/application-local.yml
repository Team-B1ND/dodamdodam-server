spring:
  data:
    redis:
      port: 6379
      host: localhost
  r2dbc:
    url: r2dbc:${MYSQL_HOST}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  flyway:
    url: jdbc:${MYSQL_HOST}
    user: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: wakeup-song-service
          uri: http://localhost:8083
          predicates:
            - Path=/wakeup-song/**
          filters:
            - StripPrefix=1
        - id: inapp-service
          uri: http://localhost:8085
          predicates:
            - Path=/inapp/**
          filters:
            - StripPrefix=1
        - id: file-service
          uri: http://localhost:8086
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1
        - id: neis-service
          uri: http://localhost:8084
          predicates:
            - Path=/neis/**
          filters:
            - StripPrefix=1
        - id: openapi-user-service
          uri: http://localhost:8081
          predicates:
            - Path=/openapi/user/**
          filters:
            - StripPrefix=2

app:
  auth:
    url: http://localhost:8082
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id: service-gateway
server:
  port: 8080

logging:
  level:
    org.springframework.r2dbc.core: DEBUG
    org.springframework.data.r2dbc: DEBUG
    io.r2dbc.mysql: DEBUG

spring:
  application:
    name: service-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 60s

  flyway:
    locations: classpath:database/migration

  profiles:
    active: local

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

app:
  auth:
    access-token-cookie: ${COOKIE_ACCESS_TOKEN_NAME:access_token}
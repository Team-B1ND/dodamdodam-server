name: CD Develop

on:
  push:
    branches: [develop]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/dodam

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all services
        run: ./gradlew build -x test --no-daemon

      - name: Rename jars to predictable names
        run: |
          for service in gateway auth user wakeup-song inapp file neis; do
            dir="services/service-${service}/build/libs"
            jar=$(find "$dir" -name "service-${service}-*.jar" ! -name "*-plain.jar" | head -1)
            if [ -n "$jar" ]; then
              cp "$jar" "$dir/service-${service}.jar"
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push service-gateway
        uses: docker/build-push-action@v6
        with:
          context: services/service-gateway/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:dev
          build-args: JAR_FILE=service-gateway.jar

      - name: Build & Push service-auth
        uses: docker/build-push-action@v6
        with:
          context: services/service-auth/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-auth:dev
          build-args: JAR_FILE=service-auth.jar

      - name: Build & Push service-user
        uses: docker/build-push-action@v6
        with:
          context: services/service-user/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-user:dev
          build-args: JAR_FILE=service-user.jar

      - name: Build & Push service-wakeup-song
        uses: docker/build-push-action@v6
        with:
          context: services/service-wakeup-song/build/libs
          file: builds/develop/Dockerfile.wakeup-song
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-wakeup-song:dev
          build-args: JAR_FILE=service-wakeup-song.jar

      - name: Build & Push service-inapp
        uses: docker/build-push-action@v6
        with:
          context: services/service-inapp/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-inapp:dev
          build-args: JAR_FILE=service-inapp.jar

      - name: Build & Push service-file
        uses: docker/build-push-action@v6
        with:
          context: services/service-file/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-file:dev
          build-args: JAR_FILE=service-file.jar

      - name: Build & Push service-neis
        uses: docker/build-push-action@v6
        with:
          context: services/service-neis/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-neis:dev
          build-args: JAR_FILE=service-neis.jar

      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/dodamdodam

            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
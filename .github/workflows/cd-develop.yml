name: CD Develop

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/team-b1nd/dodamdodam-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all services
        run: ./gradlew build -x test --no-daemon

      - name: Rename jars to predictable names
        run: |
          for service in gateway auth user wakeup-song inapp; do
            dir="services/service-${service}/build/libs"
            # Find the bootJar (the one without -plain suffix)
            jar=$(find "$dir" -name "service-${service}-*.jar" ! -name "*-plain.jar" | head -1)
            if [ -n "$jar" ]; then
              cp "$jar" "$dir/service-${service}.jar"
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push service-gateway
        uses: docker/build-push-action@v6
        with:
          context: services/service-gateway/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/service-gateway:dev
          build-args: JAR_FILE=service-gateway.jar

      - name: Build & Push service-auth
        uses: docker/build-push-action@v6
        with:
          context: services/service-auth/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/service-auth:dev
          build-args: JAR_FILE=service-auth.jar

      - name: Build & Push service-user
        uses: docker/build-push-action@v6
        with:
          context: services/service-user/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/service-user:dev
          build-args: JAR_FILE=service-user.jar

      - name: Build & Push service-wakeup-song
        uses: docker/build-push-action@v6
        with:
          context: services/service-wakeup-song/build/libs
          file: builds/develop/Dockerfile.wakeup-song
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/service-wakeup-song:dev
          build-args: JAR_FILE=service-wakeup-song.jar

      - name: Build & Push service-inapp
        uses: docker/build-push-action@v6
        with:
          context: services/service-inapp/build/libs
          file: builds/develop/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/service-inapp:dev
          build-args: JAR_FILE=service-inapp.jar

      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd ~/dodamdodam

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f